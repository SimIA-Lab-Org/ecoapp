<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .contenedor {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    padding: 24px;
    text-align: center;
  }

  .logo {
    width: 340px;
    max-width: 80vw;
    height: auto;
    animation: parpadeo 1.6s ease-in-out infinite;
  }

  @keyframes parpadeo {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo { animation: none; opacity: 0.85; }
  }

  .mensaje {
    font-size: clamp(13px, 4vw, 17px);
    color: #555555;
    white-space: nowrap;
    line-height: 1.5;
  }
</style>
